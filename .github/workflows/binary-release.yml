name: Build binaries and create GitHub Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-binary:
    name: Build binary (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macos-arm64
            os: macos-latest
            artifact: sit-macos-arm64
          - target: macos-x86_64
            os: macos-13
            artifact: sit-macos-x86_64
          - target: linux-x86_64
            os: ubuntu-latest
            artifact: sit-linux-x86_64
          - target: windows-x86_64
            os: windows-latest
            artifact: sit-windows-x86_64.exe
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pyinstaller

      - name: Build binary
        run: python scripts/build_binary.py --name sit

      - name: Rename binary
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == windows-* ]]; then
            mv dist/binary/sit.exe dist/binary/${{ matrix.artifact }}
          else
            mv dist/binary/sit dist/binary/${{ matrix.artifact }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/binary/${{ matrix.artifact }}

  create-release:
    name: Create GitHub Release
    needs: build-binary
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: binaries/*/*
